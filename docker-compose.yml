version: '3.8'

services:
  # PostgreSQL Database - Stores wallet data, transactions, balances
  postgres:
    image: postgres:16-alpine
    container_name: exbotix-wallet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: exbotix_wallet
      POSTGRES_USER: wallet_service
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_service -d exbotix_wallet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Caching and queue management
  redis:
    image: redis:7-alpine
    container_name: exbotix-wallet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Wallet Service - Main NestJS application (optional, for later)
  # wallet-api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: exbotix-wallet-api
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: development
  #     PORT: 3000
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_NAME: exbotix_wallet
  #     DB_USER: wallet_service
  #     DB_PASSWORD: ${DB_PASSWORD:-dev_password_change_in_production}
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./src:/app/src
  #     - ./node_modules:/app/node_modules

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
