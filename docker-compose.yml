version: '3.8'

services:
  # Redis - Optional caching for derived addresses
  # Note: Not strictly required for stateless service, but useful for performance
  redis:
    image: redis:7-alpine
    container_name: exbotix-wallet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Wallet Service - Main NestJS application (optional, for production deployment)
  # Uncomment when you want to run in Docker
  # wallet-api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: exbotix-wallet-api
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: production
  #     PORT: 3000
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./src:/app/src
  #     - ./node_modules:/app/node_modules

volumes:
  redis_data:
    driver: local
